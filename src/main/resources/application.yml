spring:
  application:
    name: yto
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
      enabled: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: stn123456
#    url: jdbc:mysql://localhost:3306/express_yto?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&useSSL=false&allowMultiQueries=true&autoReconnect=true&maxReconnects=3&connectTimeout=30000&socketTimeout=60000
#    测试库
    url: jdbc:mysql://localhost:3306/express_yto?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&useSSL=false&allowMultiQueries=true&autoReconnect=true&maxReconnects=3&connectTimeout=90000&socketTimeout=300000
    druid:
      # 连接池配置
      max-active: 50          # 最大活跃连接数（默认8，改成50）
      min-idle: 10            # 最小空闲连接
      initial-size: 10        # 初始连接数
      # 连接获取配置
      max-wait: 60000         # 获取连接最大等待时间（毫秒）
      time-between-eviction-runs-millis: 60000  # 清理空闲连接间隔（毫秒）
      min-evictable-idle-time-millis: 1800000    # 空闲连接最小存活时间（毫秒）- 改为30分钟
      max-evictable-idle-time-millis: 3600000    # 空闲连接最大存活时间（毫秒）- 1小时
      # 连接检测配置
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true        # 获取连接时验证，防止使用失效连接
      test-on-return: false
      # 连接保活配置（解决MySQL 8小时超时问题）
      keep-alive: true           # 启用连接保活
      phy-timeout-millis: 7200000  # 物理连接超时时间（2小时）
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: stn123456
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
server:
  port: 8088

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

# ==================================================
# Sa-Token 权限认证配置
# ==================================================
sa-token:
  token-name: satoken                    # Token名称（Cookie键名）
  timeout: 2592000                      # Token有效期（秒），30天
  active-timeout: -1                    # 无操作过期时间（秒），-1表示永不过期
  is-concurrent: true                    # 是否允许多端登录（true允许，false禁止）
  is-share: false                        # 是否共享Token（true共享，false独立）
  token-style: uuid                     # Token生成风格（uuid/jwt等）
  is-log: false                          # 是否打印Token日志
  is-read-cookie: true                   # 是否读取Cookie中的Token
  is-read-header: true                   # 是否读取Header中的Token
  is-read-body: false                    # 是否读取Body中的Token

# ==================================================
# Log4j2 日志配置
# ==================================================
# 日志配置文件位置
logging:
  config: classpath:log4j2.xml
  # 控制台日志级别（可选）
  level:
    root: INFO
    cn.dev33.satoken: DEBUG              # Sa-Token日志级别
